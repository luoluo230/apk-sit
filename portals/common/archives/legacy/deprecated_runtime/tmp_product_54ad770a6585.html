<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>五子棋 - ?????</title>
    <link rel="stylesheet" href="/static/tailwind.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Marcellus&family=Noto+Sans+SC:wght@400;500;700;800;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans SC', sans-serif; background: linear-gradient(180deg, #101526 0%, #0b0f19 55%, #0a0a12 100%); color: #e2e8f0; }
        .font-display { font-family: 'Marcellus', serif; }
        .glass { background: rgba(17, 24, 39, 0.76); border: 1px solid rgba(255,255,255,0.08); box-shadow: 0 18px 40px rgba(0,0,0,0.22); backdrop-filter: blur(10px); }
    </style>
</head>
<body>
    <header class="border-b border-white/10 bg-black/20 py-4">
        <div class="mx-auto flex max-w-6xl items-center justify-between px-4">
            <a href="/" class="font-medium text-amber-400 transition hover:text-amber-300"><i class="fas fa-arrow-left mr-2"></i>返回首页</a>
            <div class="flex items-center gap-4 text-sm">
                <a href="/news" class="text-slate-400 hover:text-white">新闻公告</a>
                <a href="/welfare" class="text-slate-400 hover:text-white">福利中心</a>
                <a href="/forum" class="text-slate-400 hover:text-white">玩家论坛</a>
                
            </div>
        </div>
    </header>
    <main class="mx-auto max-w-6xl space-y-8 px-4 py-8">
        <section class="grid items-start gap-8 lg:grid-cols-[1.02fr_0.98fr]">
            <div class="glass overflow-hidden rounded-[32px]">
                <img src="/product-media/54ad770a6585/cover.jpg" alt="五子棋" class="max-h-[520px] w-full object-cover" loading="lazy">
            </div>
            <div class="glass rounded-[32px] p-8">
                <div class="text-xs font-extrabold uppercase tracking-[0.2em] text-amber-300">游戏详情</div>
                <h1 class="font-display mt-3 text-5xl text-white">五子棋</h1>
                <p class="mt-5 leading-8 text-slate-300">五子棋</p>
                <div class="mt-6 flex flex-wrap gap-2">
                    
                    <span class="rounded-full bg-slate-800 px-3 py-1 text-xs font-bold text-slate-200">Android</span>
                    
                </div>
                <div class="mt-8">
                    <h2 class="mb-4 text-xl font-bold text-white">玩家下载与商店入口</h2>
                    <table class="w-full text-sm">
                        <thead>
                            <tr class="border-b border-slate-700 text-left text-slate-500">
                                <th class="py-2">入口</th>
                                <th class="py-2">类型</th>
                                <th class="py-2">平台</th>
                                <th class="py-2">操作</th>
                            </tr>
                        </thead>
                        <tbody>
                            
                            <tr>
                                <td colspan="4" class="py-6 text-center text-slate-500">当前尚未配置对外下载入口，请在后台补充商店链接或官方下载地址。</td>
                            </tr>
                            
                        </tbody>
                    </table>
                </div>
            </div>
        </section>

        

        

        <section class="grid grid-cols-2 gap-4 md:grid-cols-3">
            
            <div class="overflow-hidden rounded-2xl border border-slate-700/50">
                <img src="/product-media/54ad770a6585/0d400886.jpg" alt="" class="h-48 w-full object-cover" loading="lazy">
            </div>
            
        </section>

        <section class="grid gap-6 lg:grid-cols-3">
            <div class="glass rounded-[28px] p-6">
                <div class="mb-4 flex items-center justify-between gap-3">
                    <h2 class="text-xl font-bold text-white">新闻公告</h2>
                    <a href="/news" class="text-sm text-amber-300 hover:underline">查看全部</a>
                </div>
                <div class="space-y-3">
                    
                    <p class="text-sm text-slate-500">暂无相关新闻公告。</p>
                    
                </div>
            </div>
            <div class="glass rounded-[28px] p-6">
                <div class="mb-4 flex items-center justify-between gap-3">
                    <h2 class="text-xl font-bold text-white">福利中心</h2>
                    <a href="/welfare" class="text-sm text-emerald-300 hover:underline">查看全部</a>
                </div>
                <div class="space-y-3">
                    
                    <p class="text-sm text-slate-500">暂无可领取福利。</p>
                    
                </div>
            </div>
            <div class="glass rounded-[28px] p-6">
                <div class="mb-4 flex items-center justify-between gap-3">
                    <h2 class="text-xl font-bold text-white">玩家论坛</h2>
                    <a href="/forum?product_id=GameKu" class="text-sm text-cyan-300 hover:underline">进入专区</a>
                </div>
                <div class="space-y-3">
                    
                    <p class="text-sm text-slate-500">暂无玩家讨论，欢迎前往论坛发帖。</p>
                    
                </div>
            </div>
        </section>
    </main>
</body>
</html>
