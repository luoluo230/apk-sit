<link rel="stylesheet" href="/static/ops_platform.css?v=20260526p">
<section class="ops-page" data-project-id="{{ project_id }}">
  <div class="top">
    <div>
      <div class="title title-row"><span class="ops-ico ico-title ico-agent">G</span>Agent 管控中心</div>
      <div class="sub">按设备分组管理 Agent，2 秒实时同步，支持筛选与弹窗编辑</div>
    </div>
    <div class="ops-header-actions">
      <a class="btn" href="/admin/ops-platform?project_id={{ project_id }}">返回工作台</a>
      <a class="btn" href="/admin/ops-platform/topology?project_id={{ project_id }}">拓扑编排</a>
      <a class="btn" href="/admin/ops-platform/actions?project_id={{ project_id }}">动作执行</a>
    </div>
  </div>

  <section class="panel ops-section">
    <div class="hd">
      <b class="h-row"><span class="ops-ico ico-agent">S</span>控制面总览</b>
      <div class="ops-header-actions">
        <button id="btnRefreshCp" class="btn">立即刷新</button>
        <button id="btnCreateAgent" class="btn primary">新建 Agent 卡</button>
        <button id="btnCleanupExpired" class="btn ghost">清理过期 Agent</button>
      </div>
    </div>
    <div class="bd">
      <div id="cpMetrics" class="metric"></div>
    </div>
  </section>

  <section class="panel ops-section">
    <div class="hd"><b class="h-row"><span class="ops-ico ico-agent">F</span>筛选条件</b></div>
    <div class="bd agent-filters">
      <select id="filterStatus" class="sel">
        <option value="">全部状态</option>
        <option value="ONLINE">ONLINE</option>
        <option value="RUNNING">RUNNING</option>
        <option value="DEGRADED">DEGRADED</option>
        <option value="OFFLINE">OFFLINE</option>
        <option value="UNKNOWN">UNKNOWN</option>
      </select>
      <input id="filterDevice" class="inp" placeholder="按设备ID/IP筛选">
      <select id="filterBound" class="sel">
        <option value="">全部绑定状态</option>
        <option value="yes">已绑定</option>
        <option value="no">未绑定</option>
      </select>
      <select id="filterFresh" class="sel">
        <option value="active_120">仅看活跃(120秒内)</option>
        <option value="active_600">仅看活跃(10分钟内)</option>
        <option value="all">显示全部(含历史残留)</option>
      </select>
      <button id="btnApplyFilter" class="btn primary">应用筛选</button>
      <button id="btnResetFilter" class="btn ghost">重置</button>
      <span class="ops-note" id="agentRefreshHint">自动刷新：每 2 秒</span>
    </div>
  </section>

  <section class="panel ops-section">
    <div class="hd"><b class="h-row"><span class="ops-ico ico-agent">D</span>设备分组 Agent 卡片</b></div>
    <div class="bd">
      <div id="cpDevices" class="agent-device-groups"></div>
    </div>
  </section>

  <section class="panel ops-section">
    <div class="hd"><b class="h-row"><span class="ops-ico ico-agent">Q</span>租约与队列状态</b></div>
    <div class="bd"><div id="cpQueue"></div></div>
  </section>

  <section class="panel ops-section">
    <div class="hd"><b class="h-row"><span class="ops-ico ico-agent">P</span>策略与升级</b></div>
    <div class="bd"><pre id="cpPolicy" class="ops-code"></pre></div>
  </section>
</section>

<div id="agentEditModal" class="port-modal hidden" aria-hidden="true">
  <div class="port-modal-box agent-edit-modal-box">
    <div class="port-modal-head">
      <h3>编辑 Agent</h3>
      <button id="btnCloseAgentEdit" class="btn">关闭</button>
    </div>
    <div class="port-modal-hint" id="agentEditHint">编辑保存后 2 秒内会同步到卡片</div>
    <div class="agent-edit-grid">
      <label>Agent ID<input id="editAgentId" class="inp" readonly></label>
      <label>设备 ID<input id="editDeviceId" class="inp" placeholder="例如: cloud-host-1"></label>
      <label>IP 地址<input id="editHostIp" class="inp" placeholder="例如: 10.10.20.31"></label>
      <label>显示名称<input id="editDisplayName" class="inp" placeholder="例如: agent-gateway-prod"></label>
      <label>端口<input id="editPort" class="inp" type="number" min="1" max="65535"></label>
      <label>运行状态标签
        <select id="editRunState" class="sel">
          <option value="">(保持不变)</option>
          <option value="ONLINE">ONLINE</option>
          <option value="RUNNING">RUNNING</option>
          <option value="DEGRADED">DEGRADED</option>
          <option value="OFFLINE">OFFLINE</option>
          <option value="MAINTENANCE">MAINTENANCE</option>
        </select>
      </label>
      <label>描述<textarea id="editDesc" class="txt" rows="3" placeholder="Agent 描述"></textarea></label>
    </div>
    <div class="ops-header-actions" style="margin-top:10px">
      <button id="btnProbeAgent" class="btn">连通性探测</button>
      <button id="btnSaveAgentEdit" class="btn success">保存</button>
      <button id="btnCancelAgentEdit" class="btn ghost">取消</button>
    </div>
  </div>
</div>

<script src="/static/ops_platform_api.js?v=20260526p"></script>
<script src="/static/ops_platform_agent_control.js?v=20260526p"></script>
